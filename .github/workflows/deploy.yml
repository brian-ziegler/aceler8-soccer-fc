# Deploy targets: S3_BUCKET and CLOUDFRONT_DISTRIBUTION_ID match CDK stack outputs.
# AWS auth: OIDC — set repository variable AWS_DEPLOY_ROLE_ARN (stack output GitHubActionsDeployRoleArn).
#
# Branches:
#   main  → production  (uses AWS_DEPLOY_ROLE_ARN, S3_BUCKET secret, CLOUDFRONT_DISTRIBUTION_ID secret)
#   next  → next env    (uses NEXT_* repo variables set automatically by infra.yml after CDK deploy)
#
# Note: the deploy roles (prod and next) also have DynamoDB:Query permission on the aceler8-cms table,
# granted by the Aceler8CmsStack CDK stack (table.grantReadData). This allows the Fetch CMS data step
# to read content at build time.
name: Deploy to S3 and invalidate CloudFront

on:
  push:
    branches:
      - main
      - next
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment config
        id: cfg
        run: |
          if [[ "${{ github.ref_name }}" == "next" ]]; then
            echo "role=${{ vars.NEXT_AWS_DEPLOY_ROLE_ARN }}"             >> "$GITHUB_OUTPUT"
            echo "bucket=aceler8-fc-next-site"                            >> "$GITHUB_OUTPUT"
            echo "dist=${{ vars.NEXT_CLOUDFRONT_DISTRIBUTION_ID }}"      >> "$GITHUB_OUTPUT"
            echo "url=${{ vars.NEXT_PUBLIC_SITE_URL }}"                   >> "$GITHUB_OUTPUT"
          else
            echo "role=${{ vars.AWS_DEPLOY_ROLE_ARN }}"                   >> "$GITHUB_OUTPUT"
            echo "bucket=${{ secrets.S3_BUCKET }}"                        >> "$GITHUB_OUTPUT"
            echo "dist=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"         >> "$GITHUB_OUTPUT"
            echo "url=${{ vars.PUBLIC_SITE_URL }}"                        >> "$GITHUB_OUTPUT"
          fi

      - name: Check next env is bootstrapped
        if: github.ref_name == 'next' && steps.cfg.outputs.dist == ''
        run: |
          echo "::error::NEXT_CLOUDFRONT_DISTRIBUTION_ID is not set yet."
          echo "The infra workflow must run first to create the next stack and populate this variable."
          echo "Push a change inside infra/ on the next branch, wait for it to finish, then re-run this workflow."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.role }}
          aws-region: us-east-1

      - name: Fetch CMS data
        env:
          CMS_TABLE_NAME: ${{ vars.CMS_TABLE_NAME }}
          AWS_REGION: us-east-1
        run: node scripts/fetch-cms-data.mjs

      - name: Install and build
        env:
          PUBLIC_SITE_URL: ${{ steps.cfg.outputs.url }}
          PUBLIC_GA_ID: ${{ github.ref_name == 'main' && 'G-LVLVF42VRM' || '' }}
        run: |
          npm ci
          npm run build

      - name: Sync site to S3
        run: aws s3 sync dist/ "s3://${{ steps.cfg.outputs.bucket }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cfg.outputs.dist }}" \
            --paths "/*"

name: Sync next with main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync next with main
        run: git push origin HEAD:next --force

      - name: Trigger staging deploy
        run: gh workflow run deploy.yml --ref next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
